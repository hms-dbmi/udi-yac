packages:
  - packages/chat
  - packages/grammar
  # udi-toolkit is a nested package inside the grammar app; packages/* would not match it
  - packages/grammar/src/components

# merged from packages/chat/pnpm-workspace.yaml
allowBuilds:
  esbuild: true
  msw: true
minimumReleaseAgeExclude:
  - udi-toolkit

# translated from yarn `resolutions` in udi-grammar (union of app + udi-toolkit package.json)
overrides:
  flatted: 3.4.2
  node-forge: 1.4.0
  express: 4.21.2
  js-yaml: 4.1.1
  cross-spawn: 7.0.6
  glob: 10.5.0
  postcss: 8.5.15
  vite: 8.1.0
  'anymatch>picomatch': 2.3.2
  'readdirp>picomatch': 2.3.2
  'micromatch>picomatch': 2.3.2
  '@rollup/pluginutils>picomatch': 4.0.4
  'rollup-plugin-visualizer>picomatch': 4.0.4
  'tinyglobby>picomatch': 4.0.4
