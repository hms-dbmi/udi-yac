name: Deploy to GitHub Pages

# Combined Pages site:
#   /            ← chat SPA (packages/chat)
#   /grammar/    ← quasar demo app (packages/grammar-app)

on:
  push:
    branches: [main]
    paths:
      - "packages/chat/**"
      - "packages/grammar/**"
      - "packages/grammar-app/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build udi-toolkit
        run: pnpm run build:toolkit

      - name: Build chat SPA
        run: pnpm --filter udi-yac build
        env:
          VITE_BASE: ${{ vars.VITE_BASE || '/udi-yac/' }}
          VITE_UDI_API_BASE_URL: ${{ vars.VITE_UDI_API_BASE_URL }}
          VITE_UDI_DATA_PACKAGE: ${{ vars.VITE_UDI_DATA_PACKAGE }}
          VITE_UDI_MODEL: ${{ vars.VITE_UDI_MODEL }}
          VITE_UDI_REQUIRE_API_KEY: ${{ vars.VITE_UDI_REQUIRE_API_KEY }}

      - name: Build grammar demo app
        run: pnpm --filter udi-grammar-app build

      - name: Assemble site
        run: |
          mkdir site
          cp -r packages/chat/dist/* site/
          mkdir site/grammar
          cp -r packages/grammar-app/dist/spa/* site/grammar/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
