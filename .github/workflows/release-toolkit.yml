name: Release udi-toolkit

# Publish udi-toolkit BEFORE releasing udi-yac when the toolkit version moved:
# udi-yac's `workspace:*` dep is rewritten to the exact in-tree toolkit version
# at publish time, so that version must exist on npm.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write # Required for OIDC
  contents: write # Required to push commits and tags

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and smoke test
        run: |
          pnpm run build:toolkit
          cd packages/grammar
          node test/smoke-vue.mjs
          node test/smoke-ce.mjs
          node test/smoke-react.mjs
          node test/smoke-exports.mjs

      - name: Bump version
        id: bump
        working-directory: packages/grammar
        run: |
          pnpm version ${{ inputs.bump }} --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore(release): udi-toolkit-v${new_version}"
          git tag "udi-toolkit-v${new_version}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push --tags

      - name: Publish to npm
        run: pnpm --filter udi-toolkit publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "udi-toolkit-v${{ steps.bump.outputs.version }}" --generate-notes
