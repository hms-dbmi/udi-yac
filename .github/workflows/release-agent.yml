name: Publish udiagent to PyPI

# Fires only for releases tagged udiagent-vX.Y.Z — other packages' releases
# in this monorepo must not republish udiagent.

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'udiagent-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # trusted publishing via OIDC

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        # --out-dir: in a uv workspace, plain `uv build` writes to the workspace root dist/
        run: uv build --out-dir dist
        working-directory: packages/agent

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/agent/dist
